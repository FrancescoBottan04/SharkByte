<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palette per il Progetto</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex flex-col h-screen bg-slate-50">
    
    <header class="grid grid-cols-3 items-center px-8 py-8">
        <div></div>

        <h1 class="text-3xl font-bold text-center text-slate-800">
            Palette per il Progetto
        </h1>

        <div class="flex justify-end">
            <a href="index.html" class="text-slate-500 hover:text-slate-800 transition-colors flex items-center gap-2 font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewbox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 15 3 9m0 0 6-6M3 9h12a6 6 0 0 1 0 12h-3" />
                </svg>
                Torna indietro
            </a>
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-6 flex-1 w-full">
        
        <div class="flex flex-col items-center justify-center bg-[#F8F8F7] text-black group">
            <span class="mb-4 font-mono text-lg font-semibold tracking-wider">#F8F8F7</span>
        </div>

        <div class="flex flex-col items-center justify-center bg-[#D0D0D0] text-black group">
            <span class="mb-4 font-mono text-lg font-semibold tracking-wider">#D0D0D0</span>
        </div>

        <div class="flex flex-col items-center justify-center bg-[#1C1C1C] text-white group">
            <span class="mb-4 font-mono text-lg font-semibold tracking-wider">#1C1C1C</span>
        </div>

        <div class="flex flex-col items-center justify-center bg-[#393A3A] text-white group">
            <span class="mb-4 font-mono text-lg font-semibold tracking-wider">#393A3A</span>
        </div>

        <div class="flex flex-col items-center justify-center bg-[#685265] text-white group">
            <span class="mb-4 font-mono text-lg font-semibold tracking-wider">#685265</span>
        </div>
        <div class="flex flex-col items-center justify-center bg-[#F9C4B8] text-black group">
            <span class="mb-4 font-mono text-lg font-semibold tracking-wider">#F9C4B8</span>
        </div>

    </div>
</body>
</html>
